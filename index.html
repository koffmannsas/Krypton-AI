<!doctype html>
<html lang="fr" class="dark">
  <head>
    <meta charset="UTF-8" />

    <title>
      Krypton AI | Transformez votre entreprise avec l'intellignece Artificielle
      et l'automatisation
    </title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Oswald:wght@200..700&display=swap"

    <style>
      body {
        font-family: "Space Grotesk", sans-serif;
        background-color: #0b0b0f;

    <link rel="stylesheet" href="/index.css" />

  <body class="overflow-x-hidden custom-scrollbar">
    <div id="root"></div>

    <!-- 🔥 SCRIPT FIKO -->
    <script>
      async function sendToFiko(message) {
        const response = await fetch(
          "https://fikochatv2-gx7rkah46a-uc.a.run.app",
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              message,
              userId: "visitor_" + Date.now(),
              project: "krypton-ai",
            }),
          },
        );

        const data = await response.json();
        return data.reply;
      }
    </script>

    <!-- 🔥 FIREBASE AUTH (AJOUTÉ ICI) -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
      import {
        getAuth,
        createUserWithEmailAndPassword,
        signInWithEmailAndPassword,
        GoogleAuthProvider,
        signInWithPopup
      } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyCVM_0lHTDJuJt-snYxWeE-_csykE4-cwM",
        authDomain: "krypton-ai-490214.firebaseapp.com",
        projectId: "krypton-ai-490214",
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);

      // 🚀 SIGNUP
      window.signup = async (email, password) => {
        try {
          await createUserWithEmailAndPassword(auth, email, password);
          alert("Compte créé 🚀");
        } catch (e) {
          alert(e.message);
        }
      };

      // 🔐 LOGIN
      window.login = async (email, password) => {
        try {
          await signInWithEmailAndPassword(auth, email, password);
          alert("Connexion réussie 🚀");
        } catch (e) {
          alert("Identifiants incorrects");
        }
      };

      // 🌐 GOOGLE LOGIN
      const provider = new GoogleAuthProvider();

      window.googleLogin = async () => {
        try {
          await signInWithPopup(auth, provider);
        } catch (e) {
          alert(e.message);
        }
      };
    </script>

    <!-- TON APP REACT -->
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
