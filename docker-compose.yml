version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - firebase-emulator

  firebase-emulator:
    image: spine3/firebase-emulator:latest
    ports:
      - "4000:4000"
      - "8080:8080"
      - "9099:9099"
      - "5001:5001"
    volumes:
      - ./firebase.json:/firebase.json
      - ./firestore.rules:/firestore.rules

  functions:
    build:
      context: ./functions
      dockerfile: Dockerfile
    environment:
      - FIREBASE_EMULATOR_HOST=firebase-emulator:8080
    depends_on:
      - firebase-emulator
